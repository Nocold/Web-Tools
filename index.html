<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web-Tools · 實用工具集</title>
    <meta name="description" content="一個好用的線上工具集合，全部在瀏覽器內執行。" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Web-Tools" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <span class="brand"><img class="logo" src="assets/favicon.svg" alt="" width="26" height="26" /> Web-Tools</span>
        <div class="header-actions">
          <button type="button" class="reload-btn" onclick="this.classList.add('spinning');location.reload()" aria-label="重新整理" title="重新整理">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" />
              <polyline points="21 3 21 9 15 9" />
            </svg>
          </button>
          <nav>
            <a href="https://github.com/Nocold/Web-Tools" target="_blank" rel="noopener">GitHub</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>實用工具集</h1>
        <p>一系列小而美的線上工具，全部在瀏覽器內執行，資料不外傳。</p>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="搜尋工具…" autocomplete="off" />
        </div>
      </section>

      <div id="tool-grid-root"></div>
    </main>

    <footer class="site-footer">
      <div class="container">
        Web-Tools · 以純前端打造 ·
        <a href="https://github.com/Nocold/Web-Tools" target="_blank" rel="noopener">原始碼</a>
      </div>
    </footer>

    <script src="assets/js/tools.js"></script>
    <script src="assets/js/home.js"></script>
  </body>
</html>
