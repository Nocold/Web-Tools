<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />

  <body>
    <header class="site-header">

      <a class="back" href="../../">← 返回工具列表</a>
      <h1>🔊 倒數區段語音 · 試聽比較</h1>
      <p class="subtitle">播放各候選語音的「Part A. Part B. Part C.」,挑一個咬字最清楚的告訴我,我就用它重新產生全部 A–Z。</p>

      <div class="voice"><h3>Daniel</h3><div class="meta">英式英語(男)</div><audio controls preload="none" src="../../assets/audio/_voice-preview/daniel.wav"></audio></div>

      <div class="voice"><h3>Samantha</h3><div class="meta">美式英語(女)· 目前使用中(對照)</div><audio controls preload="none" src="../../assets/audio/_voice-preview/samantha.wav"></audio></div>
    </main>
  </body>
