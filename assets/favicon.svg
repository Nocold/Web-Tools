<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Web-Tools">
  <defs>
    <linearGradient id="wt-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b93f9" />
      <stop offset="1" stop-color="#3b6ef5" />
    </linearGradient>
  </defs>
  <!-- badge -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#wt-bg)" />
  <!-- toolbox handle -->
  <path d="M23 29 v-4 a9 9 0 0 1 18 0 v4" fill="none" stroke="#ffffff"
        stroke-width="4.5" stroke-linecap="round" />
  <!-- toolbox body -->
  <rect x="12" y="29" width="40" height="24" rx="4.5" fill="#ffffff" />
  <!-- lid seam -->
  <rect x="12" y="37" width="40" height="3.4" fill="#3b6ef5" />
  <!-- clasp -->
  <rect x="27" y="33.6" width="10" height="6.2" rx="2" fill="#3b6ef5" />
</svg>
